services:
  lb:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - web1
      - web2
    networks:
      - edge

  web1:
    image: redmine:6-alpine
    env_file:
      - ./env/web1.env
    expose:
      - "3000"
    volumes:
      - web1_redmine_files:/usr/src/redmine/files
      - web1_redmine_db:/usr/src/redmine/db
    networks:
      edge:
      backend:

  web2:
    image: redmine:6-alpine
    env_file:
      - ./env/web2.env
    expose:
      - "3000"
    volumes:
      - web2_redmine_files:/usr/src/redmine/files
      - web2_redmine_db:/usr/src/redmine/db
    networks:
      edge:
      backend:

  dns:
    image: coredns/coredns:1.11.3
    command: -conf /etc/coredns/Corefile
    volumes:
      - ./coredns/Corefile:/etc/coredns/Corefile:ro
      - ./coredns/zones/hosts:/etc/coredns/zones/hosts:ro
    ports:
      - "5353:53/udp"
      - "5353:53/tcp"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev_only_change_me}
      POSTGRES_DB: appdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d appdb"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  edge:
  backend:

volumes:
  postgres_data:
  web1_redmine_files:
  web1_redmine_db:
  web2_redmine_files:
  web2_redmine_db:
