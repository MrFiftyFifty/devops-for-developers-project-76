- name: Install pip packages and Docker engine
  hosts: all
  tags:
    - setup
  become: true
  pre_tasks:
    - name: Refresh apt package cache on Debian-based hosts
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 0
      when: ansible_facts.os_family == "Debian"
  roles:
    - geerlingguy.pip
    - geerlingguy.docker

- name: Install Datadog Agent on webservers
  hosts: webservers
  tags:
    - monitoring
  gather_facts: false
  tasks:
    - name: Install and configure Datadog Agent
      ansible.builtin.import_role:
        name: datadog.dd.agent
      become: true
      when:
        - datadog_api_key | length == 32
        - datadog_api_key is match('^[0-9a-fA-F]{32}$')

- name: Deploy Redmine stack
  hosts: localhost
  connection: local
  tags:
    - deploy
  gather_facts: true
  become: false
  tasks:
    - name: Ensure nginx TLS directory exists
      ansible.builtin.file:
        path: "{{ playbook_dir }}/infra/nginx/certs"
        state: directory
        mode: "0755"

    - name: Ensure TLS certificate for balancer exists
      ansible.builtin.command:
        argv:
          - openssl
          - req
          - -x509
          - -nodes
          - -days
          - "365"
          - -newkey
          - rsa:2048
          - -keyout
          - "{{ playbook_dir }}/infra/nginx/certs/devops.example.key"
          - -out
          - "{{ playbook_dir }}/infra/nginx/certs/devops.example.crt"
          - -subj
          - "/CN={{ redmine_domain }}"
          - -addext
          - "subjectAltName=DNS:{{ redmine_domain }},DNS:www.{{ redmine_domain }},DNS:localhost"
        creates: "{{ playbook_dir }}/infra/nginx/certs/devops.example.crt"

    - name: Ensure Redmine env directory exists
      ansible.builtin.file:
        path: "{{ playbook_dir }}/infra/env"
        state: directory
        mode: "0755"

    - name: Render Postgres env file for Compose
      ansible.builtin.template:
        src: db.env.j2
        dest: "{{ playbook_dir }}/infra/env/db.env"
        mode: "0600"

    - name: Render Redmine env files for Compose services
      ansible.builtin.template:
        src: redmine.env.j2
        dest: "{{ playbook_dir }}/infra/env/{{ item }}.env"
        mode: "0600"
      loop: "{{ redmine_compose_env_files }}"

    - name: Render nginx config for balancer
      ansible.builtin.template:
        src: nginx.conf.j2
        dest: "{{ playbook_dir }}/infra/nginx/nginx.conf"
        mode: "0644"

    - name: Apply Docker Compose stack
      community.docker.docker_compose_v2:
        project_src: "{{ playbook_dir }}/infra"
        state: present
        remove_orphans: true
